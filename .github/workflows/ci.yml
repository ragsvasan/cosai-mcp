name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check cosai_mcp/ tests/

      - name: Type check
        run: mypy cosai_mcp/

      - name: Test
        run: pytest --cov=cosai_mcp --cov-report=xml -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: ./coverage.xml

      - name: Upload SARIF on scanner error (exit 2)
        if: failure() && matrix.python-version == '3.11' && hashFiles('cosai-scan.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: cosai-scan.sarif

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cosai-mcp-test .

      - name: Smoke test scanner in Docker
        run: |
          # Scanner must exit with a defined code, never an unhandled exception
          docker run --network=none cosai-mcp-test cosai scan http://127.0.0.1:9999 || true
          # Only exit codes 0-3 are valid
          EXIT=$(docker run --network=none cosai-mcp-test cosai scan http://127.0.0.1:9999; echo $?)
          echo "Exit code: $EXIT"
